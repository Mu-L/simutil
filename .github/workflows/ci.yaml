name: Continuous Integration

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "art/**"
      - "install.sh"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "art/**"
      - "install.sh"

jobs:
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Analyze
        run: dart analyze --fatal-infos

  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: simutil-linux-x64
          - os: macos-15-intel
            artifact: simutil-macos-x64
          - os: macos-14
            artifact: simutil-macos-arm64
          - os: windows-latest
            artifact: simutil-windows-x64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build executable
        run: dart compile exe bin/simutil.dart -o ${{ matrix.artifact }}${{ matrix.os == 'windows-latest' && '.exe' || '' }}

      - name: Install binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p "$HOME/.local/bin"
          cp "${{ matrix.artifact }}" "$HOME/.local/bin/simutil"
          chmod +x "$HOME/.local/bin/simutil"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $installDir = Join-Path $env:LOCALAPPDATA "simutil"
          New-Item -ItemType Directory -Force -Path $installDir | Out-Null
          Copy-Item -Path "${{ matrix.artifact }}.exe" -Destination (Join-Path $installDir "simutil.exe") -Force
          Add-Content -Path $env:GITHUB_PATH -Value $installDir

      - name: Verify installed binary
        run: simutil version

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}${{ matrix.os == 'windows-latest' && '.exe' || '' }}

name: Setup Dart
description: Setup Dart SDK, install dependencies, and optionally run codegen

inputs:
  sdk:
    description: Dart SDK channel or version
    required: false
    default: stable
  run-codegen:
    description: Whether to run changelog generation and build_runner
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Setup Dart
      uses: dart-lang/setup-dart@v1
      with:
        sdk: ${{ inputs.sdk }}

    - name: Install dependencies
      shell: bash
      run: dart pub get

    - name: Generate changelog data
      if: inputs.run-codegen == 'true'
      shell: bash
      run: dart run tool/generate_changelog.dart

    - name: Run build_runner
      if: inputs.run-codegen == 'true'
      shell: bash
      run: dart run build_runner build --delete-conflicting-outputs
